<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CityFurnish | Operations Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#45455b",
                    "on-primary": "#ffffff",
                    "on-tertiary-container": "#493f20",
                    "on-secondary-fixed-variant": "#454747",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#d5c59d",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#313032",
                    "on-surface": "#1c1b1d",
                    "on-primary-container": "#83829b",
                    "surface-container-lowest": "#ffffff",
                    "inverse-primary": "#c6c4df",
                    "outline": "#78767d",
                    "surface-container-low": "#f6f2f4",
                    "error": "#ba1a1a",
                    "tertiary-container": "#b9aa83",
                    "surface-bright": "#fcf8fa",
                    "surface-variant": "#e5e1e3",
                    "secondary-container": "#dfe0e0",
                    "tertiary": "#695d3c",
                    "inverse-on-surface": "#f4f0f2",
                    "outline-variant": "#c8c5cd",
                    "on-secondary-container": "#616363",
                    "error-container": "#ffdad6",
                    "primary": "#00000b",
                    "primary-fixed-dim": "#c6c4df",
                    "background": "#fcf8fa",
                    "on-background": "#1c1b1d",
                    "surface-container-highest": "#e5e1e3",
                    "surface-tint": "#5d5c74",
                    "surface": "#fcf8fa",
                    "secondary": "#5d5f5f",
                    "surface-dim": "#ddd9db",
                    "primary-fixed": "#e2e0fc",
                    "on-secondary-fixed": "#1a1c1c",
                    "primary-container": "#1a1a2e",
                    "on-surface-variant": "#47464c",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#231b02",
                    "secondary-fixed-dim": "#c6c6c7",
                    "surface-container-high": "#ebe7e9",
                    "surface-container": "#f1edef",
                    "secondary-fixed": "#e2e2e2",
                    "tertiary-fixed": "#f2e1b7",
                    "on-primary-fixed": "#1a1a2e",
                    "on-tertiary-fixed-variant": "#514627"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "row-height-compact": "32px",
                    "sidebar-width": "260px",
                    "container-margin": "24px",
                    "row-height-standard": "44px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Hanken Grotesk"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "headline-lg": ["Hanken Grotesk"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-md": ["13px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* Subtle background pattern for the navy section */
        .navy-pattern {
            background-color: #1a1a2e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .login-card-shadow {
            box-shadow: 0px 20px 25px rgba(0,0,0,0.15);
        }

        /* Micro-interaction for inputs */
        .input-focus-ring:focus {
            outline: none;
            border-color: #1a1a2e;
            box-shadow: 0 0 0 1px #1a1a2e;
        }
    </style>
</head>
<body class="bg-primary-container min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Main Content Area: Centered Login Card -->
<main class="flex-grow flex items-center justify-center px-container-margin navy-pattern">
<div class="w-full max-w-[400px] bg-white rounded-lg login-card-shadow overflow-hidden p-10 flex flex-col items-center">
<!-- Brand Logo Header -->
<header class="mb-10 text-center">
<h1 class="font-headline-lg text-headline-lg font-black text-primary-container tracking-tighter uppercase">
                    CityFurnish
                </h1>
<p class="font-label-sm text-label-sm text-on-surface-variant tracking-widest mt-1">
                    OPERATIONS PORTAL
                </p>
</header>
<!-- Login Form -->
<form action="#" class="w-full space-y-6" method="POST">
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[18px]">mail</span>
                        Email Address
                    </label>
<input class="w-full h-row-height-standard px-4 bg-white border border-outline-variant rounded font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="warehouse.manager@cityfurnish.com" required="" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[18px]">lock</span>
                            Password
                        </label>
</div>
<input class="w-full h-row-height-standard px-4 bg-white border border-outline-variant rounded font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="pt-2">
<button class="w-full h-row-height-standard bg-primary-container text-on-primary font-label-md text-label-md rounded hover:opacity-90 active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2" type="submit">
                        Login
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
<div class="text-center">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary-container transition-colors underline-offset-4 hover:underline" href="#">
                        Forgot password?
                    </a>
</div>
</form>
<!-- Card Footer Decor -->
<div class="mt-10 pt-6 border-t border-outline-variant w-full">
<div class="flex items-center justify-center gap-3 opacity-40">
<div class="h-px bg-outline-variant flex-grow"></div>
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
</div>
</div>
</main>
<!-- Global Footer -->
<footer class="w-full py-6 text-center navy-pattern border-t border-white/5">
<p class="font-label-sm text-label-sm text-white opacity-40 tracking-[0.2em] uppercase">
            Internal use only.
        </p>
</footer>
<!-- Atmosphere/Visual Effects -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20 overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-surface-tint blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed-dim blur-[100px]"></div>
</div>
<script>
        // Micro-interaction for the login button
        const loginForm = document.querySelector('form');
        const loginBtn = document.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const originalContent = loginBtn.innerHTML;
            
            // Visual feedback for click
            loginBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            loginBtn.classList.add('opacity-80');
            loginBtn.disabled = true;

            // Simulating redirection delay
            setTimeout(() => {
                loginBtn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    Success
                `;
                loginBtn.classList.remove('bg-primary-container');
                loginBtn.classList.add('bg-green-600'); // Note: This is an exception for success state as per general UI patterns, but we stick to the primary palette where possible
                
                // Final Redirect simulation
                setTimeout(() => {
                    alert('Authenticated successfully. Redirecting to Dashboard...');
                    loginBtn.innerHTML = originalContent;
                    loginBtn.classList.remove('bg-green-600', 'opacity-80');
                    loginBtn.classList.add('bg-primary-container');
                    loginBtn.disabled = false;
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
