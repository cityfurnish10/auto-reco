                        "background": "#fcf8fa",
                        "on-background": "#1c1b1d",
                        "surface-container-highest": "#e5e1e3",
                        "surface-tint": "#5d5c74",
                        "surface": "#fcf8fa",
                        "secondary": "#5d5f5f",

                        "primary-fixed": "#e2e0fc",

                        "primary-container": "#1a1a2e",

                        "on-tertiary-fixed": "#231b02",

<body class="bg-surface text-on-surface font-body-md text-body-md overflow-hidden">
<!-- Background Dashboard (Dimmed Overlay) -->
<div class="fixed inset-0 flex">
<!-- Predicted SideNavBar -->
<aside class="fixed left-0 top-0 h-full w-[260px] flex flex-col py-6 bg-primary-container dark:bg-primary-container z-0 opacity-40 grayscale pointer-events-none">
<div class="px-6 mb-8">
<div class="font-headline-md text-headline-md font-bold text-on-primary-fixed">Operations Portal</div>
<div class="font-body-sm text-body-sm text-on-primary-container">Warehouse Reconciliation</div>
</div>
<nav class="flex-1 px-4 space-y-1">
<div class="flex items-center gap-3 px-3 h-row-height-standard bg-on-primary-fixed-variant text-on-primary border-l-4 border-error">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</div>
<div class="flex items-center gap-3 px-3 h-row-height-standard text-on-primary-container opacity-70">
<span class="material-symbols-outlined" data-icon="upload_file">upload_file</span>
<span class="font-label-md text-label-md">Guard Upload</span>
</div>
<div class="flex items-center gap-3 px-3 h-row-height-standard text-on-primary-container opacity-70">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-md text-label-md">Leaderboard</span>
</div>
</nav>
</aside>
<!-- Main Content Area (Dimmed) -->
<main class="flex-1 ml-[260px] p-container-margin opacity-40 pointer-events-none">
<!-- Predicted TopNavBar -->
<header class="fixed top-0 left-[260px] right-0 z-10 flex justify-between items-center px-container-margin h-row-height-standard bg-surface border-b border-outline-variant">
<div class="font-headline-lg text-headline-lg font-black text-primary">CityFurnish</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined" data-icon="help">help</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant"></div>
</div>
</header>
<div class="mt-row-height-standard py-8">
<div class="grid grid-cols-12 gap-gutter">
<!-- Placeholder Card -->
<div class="col-span-12 bg-white border border-outline-variant p-6 rounded shadow-sm">
<div class="h-4 bg-surface-container mb-4 w-1/4"></div>
<div class="space-y-4">
<div class="h-10 bg-surface-container-low w-full"></div>
<div class="h-10 bg-surface-container-low w-full"></div>
<div class="h-10 bg-surface-container-low w-full"></div>
</div>
</div>
</div>
</div>
</main>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-[60] bg-[#1A1A2E]/40 flex items-center justify-center p-4" id="modal-backdrop">
<!-- Modal Content: Close Variance -->
<section class="bg-white w-full max-w-[480px] rounded-xl shadow-[0px_20px_25px_rgba(0,0,0,0.15)] overflow-hidden animate-in fade-in zoom-in duration-200">
<!-- Header -->
<div class="px-6 py-4 border-b border-outline-variant flex justify-between items-center">
<h2 class="font-headline-md text-headline-md text-primary">Close Variance</h2>
<button class="p-1 hover:bg-surface-container-low transition-colors rounded">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
</div>
<div class="p-6">
<!-- Info Box -->
<div class="bg-surface-container-low p-4 rounded-lg border border-outline-variant flex items-center gap-4 mb-6">
<div class="w-12 h-12 bg-surface-container-highest flex items-center justify-center rounded">
<span class="material-symbols-outlined text-primary" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-0.5">Affected Item</p>
<div class="flex items-center gap-2">
<span class="font-headline-md text-headline-md text-primary">Ergonomic Chair X2</span>
<span class="text-on-tertiary-fixed-variant bg-tertiary-fixed font-label-sm text-label-sm px-1.5 py-0.5 rounded">FUR-099</span>
</div>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-5">
<!-- Reason Dropdown -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="reason">Reason for Closure <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full h-[44px] px-3 bg-white border border-outline rounded focus:ring-0 focus:border-primary-container appearance-none transition-all cursor-pointer" id="reason">
<option disabled="" selected="" value="">Select a reason...</option>
<option value="error">Data Entry Error</option>
<option value="delay">Transit Delay</option>
<option value="theft">Theft</option>
<option value="glitch">System Glitch</option>
<option value="other">Other</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Text Area -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="note">Add a note (optional)</label>
<textarea class="w-full p-3 bg-white border border-outline rounded focus:ring-0 focus:border-primary-container transition-all resize-none font-body-sm text-body-sm" id="note" placeholder="Explain the resolution or context..." rows="3"></textarea>
</div>
<!-- Visual Divider -->
<div class="h-px bg-outline-variant my-2"></div>
<!-- Action Buttons -->
<div class="flex items-center justify-end gap-3 pt-2">
<button class="px-6 h-[40px] border border-outline text-on-surface font-label-md text-label-md rounded hover:bg-surface-container-low transition-all" type="button">
                            Cancel
                        </button>
<button class="px-6 h-[40px] bg-primary-container text-on-primary font-label-md text-label-md rounded hover:opacity-90 active:scale-[0.98] transition-all flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span>
                            Confirm Close
                        </button>
</div>
</form>
</div>
</section>
</div>
<!-- Micro-interaction Script -->
<script>
        // Simple interactive handling for the form
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.submitter;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]" data-icon="progress_activity">progress_activity</span> Processing...';
            btn.classList.add('pointer-events-none', 'opacity-70');
            
            setTimeout(() => {
                alert('Variance for Ergonomic Chair X2 (FUR-099) has been closed successfully.');
                btn.innerHTML = originalText;
                btn.classList.remove('pointer-events-none', 'opacity-70');
            }, 1500);
        });

        // Close modal on cancel or backdrop click (mock behavior)
        const closeActions = ['button[type="button"]', '.material-symbols-outlined[data-icon="close"]'];
        closeActions.forEach(selector => {
            const el = document.querySelector(selector);
            if(el) {
                el.addEventListener('click', () => {
                    document.getElementById('modal-backdrop').classList.add('hidden');
                    document.querySelectorAll('main, aside').forEach(div => {
                        div.classList.remove('opacity-40', 'grayscale', 'pointer-events-none');
                    });
                });
            }
        });
    </script>
</body></html>
